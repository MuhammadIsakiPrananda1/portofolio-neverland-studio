# =====================================================================
# ModSecurity OWASP CRS Exception Rules - Production Hardened
# =====================================================================
#
# Purpose: Whitelist legitimate endpoints that cause false positives
# while maintaining strong security posture.
#
# Placement: /etc/apache2/conf-available/modsecurity-exceptions.conf
# Enable: sudo a2enconf modsecurity-exceptions
# Reload: sudo systemctl reload apache2

# =====================================================================
# RULE: Static Content & SEO (No ModSecurity Needed)
# =====================================================================
<LocationMatch "^/(sitemap\.xml|robots\.txt|google[a-z0-9]+\.html|\.well-known)$">
  SecRuleEngine Off
</LocationMatch>

# =====================================================================
# RULE: Public API Endpoints - Login & Registration
# =====================================================================
# Allow: login, register, password reset (these need larger payloads)
# Issue: OWASP CRS blocks legitimate password patterns
#
<LocationMatch "^/api/v1/auth/(login|register|forgot-password|reset-password)$">
  # Disable overly strict rules for auth endpoints
  SecRuleRemoveById 942431 # SQLi: Not filtering multiple spaces
  SecRuleRemoveById 942420 # SQLi: SQL Character Anomaly Detection
  SecRuleRemoveById 942100 # SQLi: Detects UNION based SQLi attempts
  SecRuleRemoveById 930100 # LFI: Path Traversal Attack
</LocationMatch>

# =====================================================================
# RULE: CTF Challenge Endpoints - Flag Submission & Query
# =====================================================================
# Allow: challenge queries, flag submission (flags can contain special chars)
# Issue: Flags might contain patterns that trigger SQLi/RCE rules
#
<LocationMatch "^/api/v1/challenges(/.*)?$">
  SecDefaultAction "id:200001,phase:2,log,allow"
  # Flag submissions can contain: base64, hex, special chars
  SecRuleRemoveById 942431 # SQLi: Space/special character detection
  SecRuleRemoveById 942420 # SQLi: SQL Anomaly Detection
  SecRuleRemoveById 200000 # Default CRS rule
  
  # Keep XSS protection
  # Keep RCE protection
  # Keep path traversal protection
</LocationMatch>

# =====================================================================
# RULE: Form Inputs & File Uploads
# =====================================================================
# Allow: contact forms, media uploads (these have longer payloads)
#
<LocationMatch "^/api/v1/(contact|upload|media)">
  SecRuleRemoveById 200001 # Generic form data patterns
  SecRuleRemoveById 942100 # UNION-based SQLi (typically not in forms)
</LocationMatch>

# =====================================================================
# RULE: 2FA & OAuth Endpoints
# =====================================================================
# Allow: 2FA verification (codes can be numeric patterns that trigger rules)
#
<LocationMatch "^/api/v1/auth/(2fa|verify|oauth)">
  SecDefaultAction "id:200002,phase:2,log,allow"
  SecRuleRemoveById 942431 # Numeric patterns in 2FA codes
</LocationMatch>

# =====================================================================
# RULE: Detection Only Mode for Non-Critical Endpoints
# =====================================================================
# Blog, projects, portfolio (read-only, low-risk) - log but don't block
#
<LocationMatch "^/api/v1/(blog|projects|services|portfolio|team|testimonials)">
  SecDefaultAction "id:200003,phase:2,log,pass"
  SecAuditEngine On
  # Logs suspicious activity but allows requests to proceed
</LocationMatch>

# =====================================================================
# RULE: Known False-Positive Rules (Global)
# =====================================================================
# These rules cause too many false positives - disable globally
#
# Rule 942431: Multiple consecutive spaces (causes issues with formatted input)
# Reason: Legitimate content can have multiple spaces
# SecRuleRemoveById 942431

# Rule 942420: Detects "union select" patterns (too broad)
# Reason: False positives in legitimate data
# SecRuleRemoveById 942420

# Rule 930100: Path traversal (only enable for file upload endpoints)
# Reason: False positives with legitimate file operations
# SecRuleRemoveById 930100

# =====================================================================
# RULE: Logging Configuration
# =====================================================================
# Ensure security events are logged for monitoring
#
<Directory "/var/www/portfolio-neverland-studio/backend/public">
  SecAuditEngine On
  SecAuditLog /var/log/apache2/modsecurity_audit.log
  SecAuditLogFormat JSON
</Directory>

# =====================================================================
# RULE: IP Whitelisting for Admin (Optional)
# =====================================================================
# Whitelist your admin IP to bypass ModSecurity completely
# More secure approach: use IP + API key authentication
#
# <If "%{REMOTE_ADDR} == '192.168.20.xx'">
#   SecRuleEngine Off
# </If>

# =====================================================================
# IMPORTANT: Keep these protections ACTIVE
# =====================================================================
# - XSS Protection (Rule 941xxx series) - KEEP ENABLED
# - Path Traversal (Rule 930100) - LIMITED to specific endpoints
# - RCE Protection (Rule 932xxx series) - KEEP ENABLED
# - Protocol Attack (Rule 921xxx series) - KEEP ENABLED

# =====================================================================
# MONITORING & INCIDENTS
# =====================================================================
# Monitor logs at: /var/log/apache2/modsecurity_audit.log
# Alert on: Phase 1 blocks (request headers)
# Alert on: Phase 2 body blocks (request content)
# Regular review: Check for attacking patterns weekly

